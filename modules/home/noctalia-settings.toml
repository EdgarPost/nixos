[bar.default]
center = [ "notifications", "clock" ]
margin_edge = 18
margin_ends = 24
shadow = false
start = [ "control-center", "workspaces" ]

[calendar]
enabled = true

    [calendar.account.home_nextcloud]
    type = "google"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-4" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-4"]
    box_height = 0.0
    box_width = 0.0
    cx = 2048.0
    cy = 1605.0
    output = "DP-4"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-4".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[nightlight]
enabled = true

[notification]
position = "top_center"

[shell]
screen_time_enabled = true
settings_show_advanced = false

[theme]
builtin = "Catppuccin"
community_palette = "Oxocarbon"
mode = "dark"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "ghostty", "hyprland" ]
    community_ids = [ "pi-agent", "zen-browser", "neovim", "rofi", "vicinae", "steam", "yazi" ]

[wallpaper]
directory = "/home/edgar/.wallpapers"
transition = [ "disc", "fade", "honeycomb", "stripes", "wipe", "zoom" ]
transition_on_startup = true

    [wallpaper.automation]
    enabled = false

    [wallpaper.default]
    path = "/home/edgar/.wallpapers/tropic_island_evening.jpg"

    [wallpaper.last]
    path = "/home/edgar/.wallpapers/tropic_island_evening.jpg"

    [wallpaper.monitors.DP-4]
    path = "/home/edgar/.wallpapers/tropic_island_evening.jpg"

[widget.clock]
format = "{:%d %B - %H:%M}"

[widget.network_rx]
display = "graph"

[widget.notifications]
hide_when_no_unread = true

[widget.spacer_2]
type = "spacer"
